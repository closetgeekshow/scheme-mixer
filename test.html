<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Remix Studio — Phase 6 Automated Test</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: dark;
    }
    body {
      margin: 0;
      padding: 0;
      background: #05060a;
      color: #e4e7f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    header p {
      margin: 0;
      opacity: 0.8;
      font-size: 13px;
    }
    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .app-shell {
      flex: 2 1 0;
      border-right: 1px solid rgba(255,255,255,0.1);
      min-width: 0;
    }
    .app-shell iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .panel {
      flex: 1 1 320px;
      min-width: 280px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel-section {
      padding: 12px 16px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .panel-section h2 {
      margin: 0 0 4px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .panel-section p {
      margin: 0;
      font-size: 13px;
      opacity: 0.85;
    }
    .panel-section code {
      font-size: 12px;
    }
    .results {
      padding: 8px 16px 0;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
    .results pre {
      margin: 0 0 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .audit {
      padding: 8px 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .audit label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    textarea#audit-log {
      width: 100%;
      min-height: 200px;
      max-height: 320px;
      background: #05060a;
      color: #e4e7f5;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.16);
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      box-sizing: border-box;
      resize: vertical;
    }
    .small {
      font-size: 11px;
      opacity: 0.78;
    }
    .status-pass { color: #4ade80; }
    .status-fail { color: #f97373; }
    .status-manual { color: #facc15; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Scheme Remix Studio — Phase 6 Automated Test</h1>
      <p>Harness auto-runs checks where possible and logs JSON lines below.</p>
    </div>
    <p class="small" id="ua"></p>
  </header>
  <main>
    <section class="app-shell">
      <iframe src="index.html" title="Scheme Remix Studio" id="app-frame"></iframe>
    </section>
    <section class="panel">
      <div class="panel-section">
        <h2>Run status</h2>
        <p>Tests run automatically when the app iframe has loaded. Copy the JSON audit log at the bottom back into chat.</p>
      </div>
      <div class="results" id="results"></div>
      <div class="audit">
        <label for="audit-log">
          Audit log
          <span class="small">All entries are JSON. You can edit notes before copying.</span>
        </label>
        <textarea id="audit-log" spellcheck="false"></textarea>
      </div>
    </section>
  </main>

  <script>
    const CHECKS = [
      { code: '6.1', label: 'CSS layer order', mode: 'manual', note: 'Verify Layers panel in DevTools shows 18 layers in order.' },
      { code: '6.2', label: 'Token derivation (color-mix)', mode: 'manual', note: 'Verify accent/green alpha tokens render correctly across browsers.' },
      { code: '6.3', label: 'No .geo-* in DOM / CSS', mode: 'auto' },
      { code: '6.4', label: 'State derivation (dummy paramType)', mode: 'manual', note: 'Add a dummy paramType to design.config.json and confirm it appears without JS changes.' },
      { code: '6.5', label: 'Class builder (6 classes)', mode: 'auto' },
      { code: '6.6', label: 'Font lazy loading (Fontsource)', mode: 'manual', note: 'Use Network tab to inspect Fontsource requests on surface changes.' },
      { code: '6.7', label: 'Lens maximize / restore', mode: 'auto' },
      { code: '6.8', label: 'Fit / 1× toggle on fixed lens', mode: 'auto' },
      { code: '6.9', label: 'Coordinate badge opacity on wild surfaces', mode: 'manual', note: 'Visually check badges over surf-holo and surf-memphis.' },
      { code: '6.10', label: 'Zoom + coords update live', mode: 'manual', note: 'Manually pan/zoom and verify badge values update.' },
      { code: '6.11', label: 'Single pointer tracker on window', mode: 'manual', note: 'Use DevTools Event Listeners to inspect window pointer listeners.' },
      { code: '6.12', label: 'ResizeObserver (no window.resize)', mode: 'manual', note: 'Resize window and confirm cameras re-seat; verify no window.resize listener.' },
      { code: '6.13', label: 'Capability layers (fx-demo, fx-holo-pan)', mode: 'auto' },
      { code: '6.14', label: 'Mobile overlay sync', mode: 'manual', note: 'On viewport < 900px verify overlay renders 5 selects and stays in sync.' },
      { code: '6.15', label: 'library.json boundary', mode: 'manual', note: 'Add preset/scheme to library.json and confirm no design/CSS changes needed.' }
    ];

    const resultsEl = document.getElementById('results');
    const logEl = document.getElementById('audit-log');

    function appendResultLine(text, statusClass) {
      const pre = document.createElement('pre');
      if (statusClass) pre.classList.add(statusClass);
      pre.textContent = text;
      resultsEl.appendChild(pre);
    }

    function appendLog(entry) {
      const line = JSON.stringify(entry);
      if (logEl.value && !logEl.value.endsWith('\n')) {
        logEl.value += '\n';
      }
      logEl.value += line + '\n';
      logEl.scrollTop = logEl.scrollHeight;
      appendResultLine(
        line,
        entry.status === 'PASS'
          ? 'status-pass'
          : entry.status === 'FAIL'
          ? 'status-fail'
          : 'status-manual'
      );
    }

    function addMeta() {
      const meta = {
        type: 'meta',
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        platform: navigator.platform || null
      };
      appendLog(meta);
    }

    function runAutoChecks(doc, win) {
      // 6.3 No .geo-* in DOM / CSS
      (function() {
        const check = CHECKS.find(c => c.code === '6.3');
        let found = false;
        // Scan DOM classes
        doc.querySelectorAll('[class]').forEach(el => {
          for (const cls of el.classList) {
            if (cls.startsWith('geo-')) {
              found = true;
            }
          }
        });
        // Scan CSS rules text
        for (const sheet of Array.from(doc.styleSheets)) {
          try {
            const rules = sheet.cssRules || [];
            for (const rule of Array.from(rules)) {
              if (rule.cssText && rule.cssText.includes('geo-')) {
                found = true;
                break;
              }
            }
          } catch (e) {
            // ignore cross-origin or restricted sheets
          }
        }
        appendLog({
          type: 'check',
          code: check.code,
          label: check.label,
          status: found ? 'FAIL' : 'PASS',
          time: new Date().toISOString(),
          notes: found ? 'Found geo- reference in DOM or CSS.' : 'No geo- classes detected in DOM or CSS.'
        });
      })();

      // 6.5 Class builder (6 classes)
      (function() {
        const check = CHECKS.find(c => c.code === '6.5');
        const comp = doc.querySelector('.the-component');
        if (!comp) {
          appendLog({
            type: 'check',
            code: check.code,
            label: check.label,
            status: 'FAIL',
            time: new Date().toISOString(),
            notes: 'No .the-component element found in app frame.'
          });
          return;
        }
        const classes = comp.className.trim().split(/\s+/).filter(Boolean);
        const hasBase = classes.includes('the-component');
        const status = hasBase && classes.length === 6 ? 'PASS' : 'FAIL';
        appendLog({
          type: 'check',
          code: check.code,
          label: check.label,
          status,
          time: new Date().toISOString(),
          notes: `Classes: ${classes.join(' ')}`
        });
      })();

      // 6.7 Lens maximize / restore
      (function() {
        const check = CHECKS.find(c => c.code === '6.7');
        const lens = doc.querySelector('.lens');
        const btn = lens && lens.querySelector('.lens-max-btn');
        if (!lens || !btn) {
          appendLog({
            type: 'check',
            code: check.code,
            label: check.label,
            status: 'FAIL',
            time: new Date().toISOString(),
            notes: 'Could not find lens or .lens-max-btn in app frame.'
          });
          return;
        }
        const before = lens.classList.contains('lens--maximized');
        btn.click();
        const after = lens.classList.contains('lens--maximized');
        btn.click();
        const restored = lens.classList.contains('lens--maximized') === before;
        const status = (!before && after && restored) ? 'PASS' : 'FAIL';
        appendLog({
          type: 'check',
          code: check.code,
          label: check.label,
          status,
          time: new Date().toISOString(),
          notes: `before=${before}, after=${after}, restored=${restored}`
        });
      })();

      // 6.8 Fit / 1× toggle on fixed lens
      (function() {
        const check = CHECKS.find(c => c.code === '6.8');
        const fixedLens = doc.querySelector('.lens.lens-fixed');
        const viewport = fixedLens && fixedLens.querySelector('.lens-viewport');
        const toggle = fixedLens && fixedLens.querySelector('.lens-view-toggle');
        if (!fixedLens || !viewport || !toggle) {
          appendLog({
            type: 'check',
            code: check.code,
            label: check.label,
            status: 'FAIL',
            time: new Date().toISOString(),
            notes: 'Missing fixed lens, viewport, or .lens-view-toggle.'
          });
          return;
        }
        const before = viewport.classList.contains('view-1x');
        toggle.click();
        const after = viewport.classList.contains('view-1x');
        toggle.click();
        const restored = viewport.classList.contains('view-1x') === before;
        const status = (!before && after && restored) ? 'PASS' : 'FAIL';
        appendLog({
          type: 'check',
          code: check.code,
          label: check.label,
          status,
          time: new Date().toISOString(),
          notes: `before=${before}, after=${after}, restored=${restored}`
        });
      })();

      // 6.13 Capability layers (fx-demo, fx-holo-pan)
      (function() {
        const check = CHECKS.find(c => c.code === '6.13');
        const root = doc.documentElement;
        const classes = root.className.trim().split(/\s+/).filter(Boolean);
        const hasDemo = classes.includes('fx-demo');
        const hasHolo = classes.includes('fx-holo-pan');
        const status = hasDemo && hasHolo ? 'PASS' : 'FAIL';
        appendLog({
          type: 'check',
          code: check.code,
          label: check.label,
          status,
          time: new Date().toISOString(),
          notes: `html classes: ${classes.join(' ')}`
        });
      })();
    }

    function logManualPlaceholders() {
      for (const check of CHECKS) {
        if (check.mode !== 'manual') continue;
        appendLog({
          type: 'check',
          code: check.code,
          label: check.label,
          status: 'MANUAL',
          time: new Date().toISOString(),
          notes: check.note || 'Requires interactive browser/devtools validation.'
        });
      }
    }

    function init() {
      const uaEl = document.getElementById('ua');
      uaEl.textContent = navigator.userAgent;

      addMeta();
      logManualPlaceholders();

      const iframe = document.getElementById('app-frame');
      iframe.addEventListener('load', () => {
        try {
          const doc = iframe.contentDocument;
          const win = iframe.contentWindow;
          // Defer a tick so app JS finishes init
          setTimeout(() => {
            runAutoChecks(doc, win);
          }, 400);
        } catch (e) {
          appendLog({
            type: 'note',
            code: 'FRAME',
            label: 'iframe access',
            time: new Date().toISOString(),
            note: 'Failed to access app iframe: ' + String(e)
          });
        }
      }, { once: true });
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
