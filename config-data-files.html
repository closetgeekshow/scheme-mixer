<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scheme Remix Studio — Config Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: dark;
    }
    body {
      margin: 0;
      padding: 0;
      background: #05060a;
      color: #e4e7f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    header p {
      margin: 0;
      font-size: 13px;
      opacity: 0.8;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .tabs {
      display: flex;
      gap: 4px;
      padding: 10px 10px 0;
    }
    .tabs button {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.04);
      color: inherit;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
    }
    .tabs button.active {
      border-color: rgba(129,140,248,1);
      background: rgba(129,140,248,0.18);
    }
    .editor textarea {
      flex: 1;
      margin: 8px 10px 0;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: #05060a;
      color: #e4e7f5;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                   "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      resize: none;
      min-height: 0;
    }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 12px;
    }
    .actions button {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      color: inherit;
      padding: 4px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    .actions button.primary {
      border-color: rgba(129,140,248,1);
      background: rgba(129,140,248,0.2);
    }
    .actions button.primary:hover {
      background: rgba(129,140,248,0.35);
    }
    .status {
      font-size: 11px;
      opacity: 0.8;
    }
    .notice {
      margin: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(255,200,0,0.08);
      border: 1px solid rgba(255,200,0,0.25);
      font-size: 12px;
      color: #fde68a;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Config Editor</h1>
      <p>Edit <code>data/*.json</code> files. Download the result and replace the file on disk.</p>
    </div>
  </header>
  <main>
    <div class="notice">
      ⚠ Requires a dev server — fetch() does not work on <code>file://</code>.
      Run <code>npx serve .</code> or use VS Code Live Server.
    </div>
    <div class="editor">
      <div class="tabs">
        <button type="button" data-file="data/app.config.json" class="active">app.config</button>
        <button type="button" data-file="data/design.config.json">design.config</button>
        <button type="button" data-file="data/library.json">library</button>
      </div>
      <textarea id="json-text" spellcheck="false"></textarea>
      <div class="actions">
        <span class="status" id="status">Select a file to load.</span>
        <div style="display:flex;gap:6px;">
          <button type="button" id="reload-btn">Reload from disk</button>
          <button type="button" id="validate-btn">Validate JSON</button>
          <button type="button" id="download-btn" class="primary">Download file</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const textarea    = document.getElementById('json-text');
    const statusEl    = document.getElementById('status');
    const reloadBtn   = document.getElementById('reload-btn');
    const validateBtn = document.getElementById('validate-btn');
    const downloadBtn = document.getElementById('download-btn');
    const tabBtns     = Array.from(document.querySelectorAll('.tabs button'));

    let currentFile = tabBtns[0].dataset.file;

    function setStatus(msg, ok = true) {
      statusEl.textContent = msg;
      statusEl.style.color = ok ? '#a5b4fc' : '#f97373';
    }

    async function loadFile(path) {
      setStatus(`Loading ${path}…`);
      try {
        const r = await fetch(`./${path}?_=${Date.now()}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const obj = await r.json();
        textarea.value = JSON.stringify(obj, null, 2);
        setStatus(`Loaded ${path}`, true);
      } catch (e) {
        textarea.value = '';
        setStatus(`Error: ${e.message}`, false);
      }
    }

    function validateJson() {
      try {
        JSON.parse(textarea.value);
        setStatus('JSON is valid ✓', true);
      } catch (e) {
        setStatus(`Invalid JSON: ${e.message}`, false);
      }
    }

    function downloadFile() {
      try {
        const parsed = JSON.parse(textarea.value);
        const blob = new Blob(
          [JSON.stringify(parsed, null, 2)],
          { type: 'application/json' }
        );
        const filename = currentFile.split('/').pop();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
        setStatus(`Downloaded ${filename} — replace the file in data/ on disk`, true);
      } catch (e) {
        setStatus(`Invalid JSON — fix errors before downloading: ${e.message}`, false);
      }
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFile = btn.dataset.file;
        loadFile(currentFile);
      });
    });

    reloadBtn.addEventListener('click', () => loadFile(currentFile));
    validateBtn.addEventListener('click', validateJson);
    downloadBtn.addEventListener('click', downloadFile);

    // Load first tab on boot
    loadFile(currentFile);
  </script>
</body>
</html>
