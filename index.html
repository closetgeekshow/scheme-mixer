<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Remix Studio</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="page">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-header-title">Scheme Remix Studio</h1>
        <p class="sidebar-header-sub">Parametric component design system</p>
      </div>
      <div id="param-list" class="param-list"></div>
      <div class="sidebar-actions">
        <button id="btn-randomize" class="btn-randomize">Randomize</button>
        <button id="btn-demo" class="btn-demo">Run Demo</button>
      </div>
    </aside>

    <main id="app" class="app"></main>

    <div id="mobile-bar" class="mobile-bar">
      <div id="mobile-param-strip" class="mobile-param-strip"></div>
      <button id="mobile-maximize" class="mobile-icon-btn" aria-label="Open parameters">⤢</button>
      <button id="mobile-btn-demo" class="mobile-btn mobile-btn-demo">Demo</button>
    </div>

    <div id="mobile-overlay" class="mobile-overlay hidden">
      <div class="mobile-overlay-inner">
        <div class="mobile-overlay-head">
          <p class="mobile-overlay-title">Parameters</p>
          <button id="mobile-overlay-close" class="mobile-overlay-close">✕</button>
        </div>
        <div id="mobile-param-list" class="param-list"></div>
        <div class="mobile-overlay-actions">
          <button id="mobile-apply" class="mobile-btn mobile-btn-apply">Apply Changes</button>
        </div>
      </div>
    </div>

    <div id="global-popover" class="popover hidden">
      <div class="popover-content"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
