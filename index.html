<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheme Remix Studio</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="page">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-header-title">Scheme Remix Studio</h1>
        <p class="sidebar-header-sub">Parametric component design system</p>
      </div>
      <div id="param-list" class="param-list"></div>
      <div class="sidebar-actions">
        <button id="btn-randomize" class="btn-randomize">Randomize</button>
        <button id="btn-demo" class="btn-demo">Run Demo</button>
      </div>
    </aside>

    <main id="app" class="app"></main>

    <div id="mobile-bar" class="mobile-bar">
      <div id="mobile-param-strip" class="mobile-param-strip"></div>

      <button id="mobile-maximize" class="mobile-icon-btn" aria-label="Open parameters">
        ⤢
      </button>

      <button id="mobile-btn-demo" class="mobile-btn mobile-btn-demo">Demo</button>
    </div>

    <div id="mobile-overlay" class="mobile-overlay hidden">
      <div class="mobile-overlay-inner">
        <div class="mobile-overlay-head">
          <p class="mobile-overlay-title">Parameters</p>
          <button id="mobile-overlay-close" class="mobile-overlay-close">✕</button>
        </div>

        <div id="mobile-param-list" class="param-list"></div>

        <div class="mobile-overlay-actions">
          <button id="mobile-apply" class="mobile-btn mobile-btn-apply">Apply Changes</button>
        </div>
      </div>
    </div>

    <div id="global-popover" class="popover hidden">
      <div class="popover-content"></div>
    </div>
  </div>

  <script type="application/json" id="cfg-app">
  {
    "title": "Scheme Remix Studio",
    "subtitle": "Parametric component design system",
    "demoActiveDuration": 1800,
    "camera": {
      "panClamp": [-1, 1],
      "zoomClamp": [0.5, 3]
    },
    "capabilityLayerRegistry": [
      {
        "id": "fx-demo",
        "layer": "effects.demo",
        "alwaysOn": true,
        "description": "Enables demo-active motion accents and lens hover transforms."
      },
      {
        "id": "fx-holo-pan",
        "layer": "effects.holo-pan",
        "alwaysOn": true,
        "description": "Animates holographic surfaces with a slow pan."
      }
    ],
    "primitiveRegistry": [
      {"name": "--_bg-950", "cssType": "color"},
      {"name": "--_bg-900", "cssType": "color"},
      {"name": "--_bg-800", "cssType": "color"},
      {"name": "--_border-low", "cssType": "color"},
      {"name": "--_border-mid", "cssType": "color"},
      {"name": "--_text-hi", "cssType": "color"},
      {"name": "--_text-mid", "cssType": "color"},
      {"name": "--_text-lo", "cssType": "color"},
      {"name": "--_accent", "cssType": "color"},
      {"name": "--_green", "cssType": "color"},
      {"name": "--r-xs", "cssType": "length"},
      {"name": "--r-sm", "cssType": "length"},
      {"name": "--r-md", "cssType": "length"},
      {"name": "--r-lg", "cssType": "length"},
      {"name": "--r-xl", "cssType": "length"},
      {"name": "--r-2xl", "cssType": "length"},
      {"name": "--sp-xs", "cssType": "length"},
      {"name": "--sp-sm", "cssType": "length"},
      {"name": "--sp-md", "cssType": "length"},
      {"name": "--sp-lg", "cssType": "length"},
      {"name": "--sp-xl", "cssType": "length"},
      {"name": "--z-lens-overlay", "cssType": "number"},
      {"name": "--z-maximized", "cssType": "number"},
      {"name": "--z-mobile-bar", "cssType": "number"},
      {"name": "--z-popover", "cssType": "number"},
      {"name": "--sidebar-width", "cssType": "length"}
    ]
  }
  </script>

  <script type="application/json" id="cfg-design">
  {
    "propSets": [
      {
        "id": "surfaceMaterial",
        "label": "Surface Material",
        "props": [
          {"name": "--comp-bg", "cssType": "string", "initial": "ffffff", "registerProperty": false},
          {"name": "--comp-bg-img", "cssType": "string", "initial": "none", "registerProperty": false},
          {"name": "--comp-bg-size", "cssType": "string", "initial": "auto", "registerProperty": false},
          {"name": "--comp-bg-pos", "cssType": "string", "initial": "0 0", "registerProperty": false},
          {"name": "--comp-backdrop", "cssType": "string", "initial": "none", "registerProperty": false},
          {"name": "--comp-color", "cssType": "color", "initial": "000000", "registerProperty": true},
          {"name": "--comp-font", "cssType": "string", "initial": "var(--sans)", "registerProperty": false},
          {"name": "--comp-font-weight", "cssType": "number", "initial": 400, "registerProperty": false},
          {"name": "--comp-text-transform", "cssType": "string", "initial": "none", "registerProperty": false},
          {"name": "--comp-letter-spacing", "cssType": "string", "initial": "normal", "registerProperty": false},
          {"name": "--btn-bg", "cssType": "string", "initial": "eeeeee", "registerProperty": false},
          {"name": "--btn-color", "cssType": "string", "initial": "inherit", "registerProperty": false}
        ]
      },
      {
        "id": "shapeGeometry",
        "label": "Shape Geometry",
        "props": [
          {"name": "--comp-radius", "cssType": "length", "initial": "8px", "registerProperty": true},
          {"name": "--comp-clip", "cssType": "string", "initial": "none", "registerProperty": false},
          {"name": "--btn-radius", "cssType": "length", "initial": "4px", "registerProperty": true},
          {"name": "--btn-clip", "cssType": "string", "initial": "none", "registerProperty": false}
        ]
      },
      {
        "id": "depthElevation",
        "label": "Depth Elevation",
        "props": [
          {"name": "--comp-shadow", "cssType": "string", "initial": "none", "registerProperty": false},
          {"name": "--comp-border", "cssType": "string", "initial": "1px solid transparent", "registerProperty": false},
          {"name": "--btn-shadow", "cssType": "string", "initial": "none", "registerProperty": false},
          {"name": "--btn-border", "cssType": "string", "initial": "1px solid transparent", "registerProperty": false}
        ]
      },
      {
        "id": "motionDynamics",
        "label": "Motion Dynamics",
        "props": [
          {"name": "--comp-motion", "cssType": "string", "initial": "all 300ms ease", "registerProperty": false}
        ]
      },
      {
        "id": "spatialDensity",
        "label": "Spatial Density",
        "props": [
          {"name": "--comp-padding", "cssType": "length", "initial": "28px", "registerProperty": true},
          {"name": "--comp-gap", "cssType": "length", "initial": "0px", "registerProperty": true},
          {"name": "--comp-font-size-base", "cssType": "length", "initial": "1rem", "registerProperty": true},
          {"name": "--comp-line-height", "cssType": "number", "initial": 1.6, "registerProperty": true},
          {"name": "--btn-padding", "cssType": "string", "initial": "11px 20px", "registerProperty": false}
        ]
      }
    ],
    "paramTypes": [
      {
        "id": "surface",
        "cssPrefix": "surf",
        "label": "Surface Material",
        "description": "Material finish and typography",
        "propSetIds": ["surfaceMaterial"],
        "options": [
          {"value": "velvet", "label": "Velvet — Matte Solid", "fontsource": "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"},
          {"value": "console", "label": "Console — Retro Green", "fontsource": "https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap"},
          {"value": "glass", "label": "Glass — Neumorphic Blur", "fontsource": "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"},
          {"value": "frutiger", "label": "Frutiger — Swiss Modern", "fontsource": "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"},
          {"value": "memphis", "label": "Memphis — Postmodern", "fontsource": "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"},
          {"value": "artdeco", "label": "Art Deco — Deco Geometric", "fontsource": "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap"},
          {"value": "grunge", "label": "Grunge — Distressed Grit", "fontsource": "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"},
          {"value": "holo", "label": "Holo — Iridescent Pan", "fontsource": "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"}
        ]
      },
      {
        "id": "shape",
        "cssPrefix": "shape",
        "label": "Shape Geometry",
        "description": "Silhouette and boundary style",
        "propSetIds": ["shapeGeometry"],
        "options": [
          {"value": "pill", "label": "Pill — Smooth Capsule"},
          {"value": "sharp", "label": "Sharp — Hard Edges"},
          {"value": "soft", "label": "Soft — Gentle Rounds"},
          {"value": "chamfer", "label": "Chamfer — Beveled Edge"},
          {"value": "bauhaus", "label": "Bauhaus — Grid Modular"},
          {"value": "concentric", "label": "Concentric — Nested Rings"},
          {"value": "squircle", "label": "Squircle — Smooth Polygon"}
        ]
      },
      {
        "id": "depth",
        "cssPrefix": "depth",
        "label": "Depth Elevation",
        "description": "Shadow, border, and Z-space",
        "propSetIds": ["depthElevation"],
        "options": [
          {"value": "flat", "label": "Flat — No Shadow"},
          {"value": "raised", "label": "Raised — Lifted Shadow"},
          {"value": "sunken", "label": "Sunken — Inset Shadow"},
          {"value": "neumorphic", "label": "Neumorphic — Soft UI"},
          {"value": "brutalist", "label": "Brutalist — Harsh Border"},
          {"value": "glowing", "label": "Glowing — Neon Edge"},
          {"value": "concentric", "label": "Concentric — Ring Borders"}
        ]
      },
      {
        "id": "motion",
        "cssPrefix": "mo",
        "label": "Motion Dynamics",
        "description": "Transition timing and easing",
        "propSetIds": ["motionDynamics"],
        "options": [
          {"value": "velvet", "label": "Velvet — Smooth 300ms Ease"},
          {"value": "console", "label": "Console — Snappy 150ms Linear"},
          {"value": "elastic", "label": "Elastic — Springy 600ms Cubic"},
          {"value": "glitch", "label": "Glitch — Stuttering 100ms Steps"},
          {"value": "float", "label": "Float — Floating 400ms Ease-Out"},
          {"value": "whip", "label": "Whip — Fast Snap 50ms Ease-Out"},
          {"value": "spring", "label": "Spring — Bouncy 800ms Cubic"}
        ]
      },
      {
        "id": "density",
        "cssPrefix": "density",
        "label": "Spatial Density",
        "description": "Padding, gaps, and typography rhythm",
        "propSetIds": ["spatialDensity"],
        "options": [
          {"value": "compact", "label": "Compact — 14px Dense"},
          {"value": "normal", "label": "Normal — 16px Default"},
          {"value": "airy", "label": "Airy — 18px Breathing"},
          {"value": "wide", "label": "Wide — 20px Spacious"}
        ]
      }
    ],
    "lenses": [
      {"id": "actual", "zoom": 1, "desc": "Actual", "x": 0.5, "y": 0.5, "fixed": true},
      {"id": "geometry", "zoom": 2, "desc": "Geometry", "x": 0.5, "y": 0.5, "fixed": false},
      {"id": "surface", "zoom": 0.75, "desc": "Surface", "x": 0.3, "y": 0.3, "fixed": false}
    ]
  }
  </script>

  <script type="application/json" id="cfg-library">
  {
    "presets": [],
    "schemes": []
  }
  </script>

  <template id="tpl-component">
    <div class="the-component">
      <h2>Protocol Status</h2>
      <p>This module verifies the structural integrity of the active design paradigm. Adjust parameters to observe systemic cascading effects.</p>
      <div class="comp-actions">
        <button class="comp-btn">Acknowledge</button>
        <button class="comp-btn secondary">Halt</button>
      </div>
    </div>
  </template>

  <template id="tpl-param-item">
    <div class="param-item">
      <div class="param-header">
        <span class="param-label"></span>
        <button class="param-help-btn" type="button">?</button>
      </div>
      <select class="param-select"></select>
    </div>
  </template>

  <template id="tpl-lens-badge-tl">
    <div class="lens-badge lens-badge-tl">
      <span class="lens-zoom-num"></span>
      <span class="lens-zoom-dot">·</span>
      <span class="lens-desc"></span>
    </div>
  </template>

  <template id="tpl-lens-badge-bl">
    <div class="lens-badge lens-badge-bl">
      <span class="lens-zoom-num"></span>
      <span class="lens-zoom-dot">·</span>
      <span class="lens-coords"></span>
    </div>
  </template>

  <script type="module" src="js/main.js"></script>
</body>
</html>
