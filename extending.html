<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scheme Remix Studio - Documentation</title>

    <!-- Tailwind CSS & Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            typography: {
              DEFAULT: {
                css: {
                  maxWidth: "100%",
                  code: {
                    color: "#8b5cf6",
                    backgroundColor: "#f3f4f6",
                    padding: "0.2em 0.4em",
                    borderRadius: "0.25rem",
                    fontWeight: "600",
                  },
                  "code::before": { content: '""' },
                  "code::after": { content: '""' },
                  pre: {
                    backgroundColor: "#282c34",
                    color: "#abb2bf",
                    borderRadius: "0.5rem",
                  },
                },
              },
            },
          },
        },
      };
    </script>

    <!-- Highlight.js for Code Syntax -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Mermaid.js for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@9/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({ startOnLoad: false, theme: "default" });
    </script>

    <!-- Docsify -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@1"></script>

    <style>
      /* Custom scrollbar for sidebar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Docsify sidebar styling */
      .sidebar {
        width: 288px !important;
        background: white !important;
        border-right: 1px solid #e2e8f0 !important;
        padding: 1.5rem !important;
      }

      .sidebar ul {
        list-style: none !important;
        padding-left: 0 !important;
        margin: 0 !important;
      }

      .sidebar li {
        margin-bottom: 0.25rem !important;
      }

      .sidebar a {
        display: block;
        padding: 0.5rem 0.75rem;
        color: #475569 !important;
        text-decoration: none !important;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
      }

      .sidebar a:hover {
        background-color: #f1f5f9 !important;
        color: #0f172a !important;
      }

      .sidebar a.active {
        background-color: #eff6ff !important;
        color: #2563eb !important;
      }

      .sidebar-header {
        margin-bottom: 1.5rem;
      }

      .sidebar-footer {
        margin-top: 2rem;
        padding-top: 1rem;
      }

      /* Main content area */
      .content {
        max-width: 100% !important;
        padding: 0 !important;
      }

      .markdown-section {
        padding: 0 !important;
      }

      .markdown-section h1 {
        font-size: 2rem !important;
        font-weight: 800 !important;
        margin-top: 0 !important;
        margin-bottom: 1.5rem !important;
        color: #0f172a !important;
      }

      .markdown-section h2 {
        font-size: 1.5rem !important;
        font-weight: 700 !important;
        border-bottom: 1px solid #e2e8f0 !important;
        padding-bottom: 0.5rem !important;
        margin-top: 2rem !important;
        margin-bottom: 1rem !important;
      }

      .markdown-section h3 {
        font-size: 1.25rem !important;
        font-weight: 600 !important;
        margin-top: 1.5rem !important;
        margin-bottom: 0.75rem !important;
      }

      .markdown-section p {
        margin-bottom: 1rem !important;
        line-height: 1.75 !important;
      }

      .markdown-section ul, .markdown-section ol {
        margin-bottom: 1rem !important;
        padding-left: 1.5rem !important;
      }

      .markdown-section li {
        margin-bottom: 0.5rem !important;
      }

      .markdown-section code:not(.language-) {
        color: #8b5cf6 !important;
        background-color: #f3f4f6 !important;
        padding: 0.2em 0.4em !important;
        border-radius: 0.25rem !important;
        font-weight: 600 !important;
      }

      .markdown-section pre {
        background-color: #282c34 !important;
        border-radius: 0.5rem !important;
        padding: 1rem !important;
        overflow-x: auto !important;
        margin-bottom: 1rem !important;
      }

      .markdown-section pre code {
        color: #abb2bf !important;
        background: none !important;
        padding: 0 !important;
      }

      .markdown-section table {
        width: 100% !important;
        border-collapse: collapse !important;
        margin-bottom: 1rem !important;
      }

      .markdown-section th, .markdown-section td {
        border: 1px solid #e2e8f0 !important;
        padding: 0.5rem !important;
        text-align: left !important;
      }

      .markdown-section th {
        background-color: #f8fafc !important;
        font-weight: 600 !important;
      }

      .markdown-section blockquote {
        border-left: 4px solid #8b5cf6 !important;
        padding-left: 1rem !important;
        margin: 1rem 0 !important;
        color: #64748b !important;
      }

      .markdown-section hr {
        border: none !important;
        border-top: 1px solid #e2e8f0 !important;
        margin: 2rem 0 !important;
      }

      .markdown-section a {
        color: #2563eb !important;
        text-decoration: underline !important;
      }

      .markdown-section a:hover {
        color: #1d4ed8 !important;
      }

      .markdown-section img {
        max-width: 100% !important;
        height: auto !important;
      }

      .mermaid {
        display: flex !important;
        justify-content: center !important;
        background: white !important;
        padding: 1rem !important;
        border-radius: 0.5rem !important;
        border: 1px solid #e2e8f0 !important;
        margin: 1.5rem 0 !important;
      }

      /* Mobile menu button */
      .mobile-menu-btn {
        display: none;
      }

      @media (max-width: 768px) {
        .mobile-menu-btn {
          display: flex !important;
          position: fixed !important;
          top: 1rem !important;
          left: 1rem !important;
          z-index: 60 !important;
          padding: 0.5rem !important;
          background: white !important;
          border: 1px solid #e2e8f0 !important;
          border-radius: 0.375rem !important;
        }

        .sidebar {
          position: fixed !important;
          z-index: 50 !important;
          height: 100vh !important;
          transform: translateX(-100%) !important;
          transition: transform 0.3s ease-in-out !important;
          padding-top: 4rem !important;
        }

        .sidebar.open {
          transform: translateX(0) !important;
        }

        .sidebar-overlay {
          display: none !important;
          position: fixed !important;
          inset: 0 !important;
          background: rgba(0, 0, 0, 0.5) !important;
          z-index: 40 !important;
        }

        .sidebar-overlay.open {
          display: block !important;
        }

        .content {
          margin-left: 0 !important;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased overflow-hidden flex h-screen">
    <!-- Mobile Menu Button -->
    <button
      id="mobile-menu-btn"
      class="mobile-menu-btn p-2 text-slate-600 hover:bg-slate-100 rounded-lg focus:outline-none">
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <!-- Mobile Sidebar Backdrop -->
    <div
      id="sidebar-backdrop"
      class="sidebar-overlay"></div>

    <!-- Sidebar Navigation -->
    <aside
      id="sidebar"
      class="sidebar">
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto bg-white relative">
      <div class="content max-w-4xl mx-auto px-6 py-10 md:py-16 pb-24">
        <div id="app"></div>
      </div>
    </main>

    <script>
      // Mobile menu handling
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');

      function toggleMobileMenu() {
        sidebar.classList.toggle('open');
        backdrop.classList.toggle('open');
      }

      function closeMobileMenu() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('open');
      }

      mobileMenuBtn.addEventListener('click', toggleMobileMenu);
      backdrop.addEventListener('click', closeMobileMenu);

      // Close mobile menu when clicking on sidebar links
      document.addEventListener('click', (e) => {
        if (window.innerWidth < 768 && e.target.closest('.sidebar a')) {
          closeMobileMenu();
        }
      });

      // Docsify configuration
      window.$docsify = {
        basePath: '/extending/',
        homepage: '1-adding-a-new-option.md',
        sidebar: '_sidebar.md',
        subMaxLevel: 2,
        auto2top: true,
        executeScript: true,
        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: 'Type to search',
          noData: 'No Results!',
          depth: 2
        },
        markdown: {
          renderer: {
            code: function(code, lang) {
              if (lang && hljs.getLanguage(lang)) {
                try {
                  return '<pre><code class="hljs language-' + lang + '">' +
                    hljs.highlight(code, { language: lang }).value +
                    '</code></pre>';
                } catch (__) {}
              }
              return '<pre><code class="hljs">' + code + '</code></pre>';
            }
          }
        },
        mermaid: {
          theme: 'default',
          logLevel: 0,
          startOnLoad: false
        }
      };
    </script>
  </body>
</html>
